<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Learning Alarm</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:rgba(255,255,255,0.12);
    padding:20px;
    border-radius:20px;
    width:340px;
    text-align:center;
    backdrop-filter:blur(12px);
}

button{
    width:90%;
    margin:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>⏰ Smart Alarm Learning</h2>

<div id="clock"></div>

<input type="time" id="alarmTime">
<button onclick="setAlarm()">Set Alarm</button>

<h3 id="score">Score: 0</h3>
<h3 id="level">Level: 1</h3>

<button onclick="startLearning()" id="startBtn">Start Learning</button>

<div id="quiz" style="display:none;">
  <h2 id="word"></h2>

  <button onclick="check(0)" id="a"></button>
  <button onclick="check(1)" id="b"></button>
  <button onclick="check(2)" id="c"></button>
</div>

</div>

<!-- SOUNDS -->
<audio id="alarmMusic" loop src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6b5f7d0.mp3?filename=morning-alarm-clock-113180.mp3"></audio>
<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>

let words = [
  {w:"sustainable",o:["устойчивый","быстрый","опасный"],c:0},
  {w:"inevitable",o:["неизбежный","возможный","редкий"],c:0},
  {w:"challenge",o:["вызов","ответ","ошибка"],c:0},
  {w:"knowledge",o:["знание","игра","шум"],c:0},
  {w:"strategy",o:["стратегия","хаос","случай"],c:0},
  {w:"focus",o:["фокус","разброс","сон"],c:0},
  {w:"success",o:["успех","провал","ошибка"],c:0},
  {w:"discipline",o:["дисциплина","лень","страх"],c:0}
];

let i=0,score=0,level=1,alarm="";
let alarmTriggered=false;
let unlocked=false;

function clock(){
  document.getElementById("clock").innerText=new Date().toLocaleTimeString();
}
setInterval(clock,1000);

function setAlarm(){
  alarm=document.getElementById("alarmTime").value;
  alert("Alarm set!");
}

function unlockSound(){
  let a=document.getElementById("alarmMusic");
  a.play().then(()=>{a.pause();unlocked=true;});
}

// IMPORTANT: unlock sound first click
document.addEventListener("click",unlockSound,{once:true});

setInterval(()=>{
  let now=new Date().toTimeString().slice(0,5);

  if(now===alarm && !alarmTriggered){
    alarmTriggered=true;
    startAlarm();
  }
},1000);

function startAlarm(){
  if(unlocked){
    let m=document.getElementById("alarmMusic");
    m.play();
  }
}

function startLearning(){
  document.getElementById("alarmMusic").pause();
  document.getElementById("alarmMusic").currentTime=0;

  document.getElementById("startBtn").style.display="none";

  document.getElementById("quiz").style.display="block";

  load();
}

function load(){
  let w=words[i];
  document.getElementById("word").innerText=w.w;

  document.getElementById("a").innerText=w.o[0];
  document.getElementById("b").innerText=w.o[1];
  document.getElementById("c").innerText=w.o[2];

  document.getElementById("score").innerText="Score:"+score;
  document.getElementById("level").innerText="Level:"+level;
}

function check(ans){
  if(ans===words[i].c){
    score+=10;
    document.getElementById("correctSound").play();
    i++;

    if(i%5===0) level++;

    if(i>=words.length){
      alert("Done! Score: "+score);
      i=0;score=0;level=1;
      document.getElementById("quiz").style.display="none";
      document.getElementById("startBtn").style.display="block";
    }
    load();
  }else{
    score-=5;
    alert("Wrong!");
  }
}

</script>

</body>
</html>
